name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Ruff linter
        run: ruff check src/ engine/ advisors/ financial_news/ tests/

      - name: Run Ruff formatter check
        run: ruff format --check src/ engine/ advisors/ financial_news/ tests/

      - name: Run MyPy type checker
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true  # Type errors are warnings for now

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov=engine \
            --cov=advisors \
            --cov=financial_news \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v \
            --tb=short

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  quant-tests:
    name: Quantitative Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run quant fixture tests (textbook values)
        run: pytest tests/test_quant_fixtures.py -v --tb=long

      - name: Run point-in-time tests (anti-lookahead)
        run: pytest tests/test_point_in_time.py -v --tb=long

      - name: Run property-based tests
        run: pytest tests/test_properties.py -v --tb=long
        env:
          HYPOTHESIS_PROFILE: ci

      - name: Run advanced quant tests (3rd-order Greeks, American options)
        run: pytest tests/test_advanced_quant.py -v --tb=long

      - name: Run dashboard tests
        run: pytest tests/test_dashboard.py -v --tb=long

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit security linter
        run: bandit -r src/ engine/ -ll
        continue-on-error: true

      - name: Check for known vulnerabilities
        run: pip install -e ".[dev]" && safety check
        continue-on-error: true

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest tests/ -v -m "integration" --tb=short
        continue-on-error: true  # Integration tests may need external services
