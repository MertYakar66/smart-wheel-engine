name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"

jobs:
  environment-check:
    name: Environment Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate environment
        run: python scripts/validate_environment.py --dev --verbose

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Ruff linter
        run: ruff check src/ engine/ data/ advisors/ financial_news/ tests/ scripts/ utils/ news_pipeline/ dashboard/ backtests/regression/

      - name: Run Ruff formatter check
        run: ruff format --check src/ engine/ data/ advisors/ financial_news/ tests/ scripts/ utils/ news_pipeline/ dashboard/ backtests/regression/

      - name: Run MyPy type checker
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true  # Type errors are warnings for now

  manifest-coverage:
    name: FILE_MANIFEST Coverage
    runs-on: ubuntu-latest
    # Independent of the lint job: stdlib + git only, no pip install, no needs.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check FILE_MANIFEST.md covers every tracked file
        run: python scripts/check_manifest_coverage.py

      - name: Check doc currency (PROJECT_STATE / CHANGELOG freshness)
        run: python scripts/check_doc_currency.py

      - name: Check worklog index is current
        run: python scripts/gen_worklog_index.py --check

  decision-layer-claim:
    name: Decision-Layer Lane Claim
    runs-on: ubuntu-latest
    # PR-only: a PR that edits the decision-layer trio (ev_engine /
    # wheel_runner / candidate_dossier) must carry a lane-claim block naming
    # the file (docs/PARALLEL_SESSIONS.md §5). stdlib + git only — no pip.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Enforce decision-layer lane claim
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}"
          python scripts/check_lane_claim.py --base "origin/${{ github.base_ref }}"

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: [environment-check]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/ \
            -m "not backtest_regression" \
            --cov=src \
            --cov=engine \
            --cov=advisors \
            --cov=financial_news \
            --cov=data \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v \
            --tb=short

      - name: Decision-layer coverage floor (the §2 trio)
        # The aggregate --cov-fail-under=80 above spans ~63k LOC, so the
        # decision-layer trio (~8% of it) could regress badly without tripping
        # it — a large untested branch in ev_engine/wheel_runner/candidate_dossier
        # would still clear 80 (adversarial-review Dim-5 F1, 2026-06-15). Re-use
        # the .coverage the step above already wrote (no second test run) and
        # enforce a per-file floor on the trio. Floors are the earned 2026-06-15
        # full-suite numbers minus a ~3pp buffer (dossier 91 / ev_engine 95 /
        # wheel_runner 57); ratchet up as coverage improves.
        run: |
          coverage report --include="*/candidate_dossier.py" --fail-under=88
          coverage report --include="*/ev_engine.py" --fail-under=90
          coverage report --include="*/wheel_runner.py" --fail-under=54

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

      # Additive: regenerate coverage.json from the .coverage data already
      # collected by the test step above, and upload it as a build artifact.
      # Does not change the test step's pass/fail behaviour or the
      # --cov-fail-under gate; the artifact is for the tested-surface map
      # (docs/TESTED_SURFACE_MAP.md) and ad-hoc gap drill-downs.
      # if: always() so we still publish the artifact when a test failed.
      - name: Generate coverage.json artifact
        if: always()
        run: coverage json -o coverage.json

      - name: Upload coverage.json artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-json-py${{ matrix.python-version }}
          path: coverage.json
          if-no-files-found: warn
          retention-days: 30

  quant-tests:
    name: Quantitative Validation
    runs-on: ubuntu-latest
    needs: [environment-check]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run quant fixture tests (textbook values)
        run: pytest tests/test_quant_fixtures.py -v --tb=long

      - name: Run point-in-time tests (anti-lookahead)
        run: pytest tests/test_point_in_time.py -v --tb=long

      - name: Run property-based tests
        run: pytest tests/test_properties.py -v --tb=long
        env:
          HYPOTHESIS_PROFILE: ci

      - name: Run advanced quant tests (3rd-order Greeks, American options)
        run: pytest tests/test_advanced_quant.py -v --tb=long

      - name: Run infrastructure tests
        run: pytest tests/test_infrastructure.py -v --tb=long

      - name: Run dashboard tests
        run: pytest tests/test_dashboard.py -v --tb=long

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit security linter
        run: bandit -r src/ engine/ -ll
        continue-on-error: true

      - name: Check for known vulnerabilities
        run: pip install -e ".[dev]" && safety check
        continue-on-error: true

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest tests/ -v -m "integration" --tb=short
        continue-on-error: true  # Integration tests may need external services
